<!DOCTYPE html>
<html>
<head>
  <title>Style Me 👕</title>
  <style>
    :root {
      --bg: #0b0f1a;
      --panel: rgba(255, 255, 255, 0.06);
      --panel-strong: rgba(255, 255, 255, 0.12);
      --text: #f4f6ff;
      --muted: rgba(244, 246, 255, 0.65);
      --accent: #7c5cff;
      --danger: #ff5a5f;
      --radius: 16px;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      --max-width: 840px;
      --transition: 160ms ease;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, #4b4cff 0%, #0b0f1a 60%);
      display: flex;
      justify-content: center;
      padding: 32px 16px;
    }

    .container {
      width: min(100%, var(--max-width));
      display: grid;
      gap: 18px;
    }

    .header {
      text-align: center;
      padding: 24px 20px;
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .header h1 {
      margin: 0;
      font-size: clamp(2rem, 3.2vw, 2.8rem);
      letter-spacing: -0.02em;
    }

    .header .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
    }

    .card {
      padding: 20px;
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    h2 {
      margin: 0 0 14px;
      font-size: 1.25rem;
    }

    .form-row {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 1fr auto;
      align-items: center;
    }

    input,
    select {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 12px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: rgba(124, 92, 255, 0.7);
      box-shadow: 0 0 0 4px rgba(124, 92, 255, 0.18);
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      cursor: pointer;
      font-weight: 600;
      transition: transform var(--transition), filter var(--transition);
    }

    button.primary {
      background: linear-gradient(135deg, #7c5cff, #2c8cff);
      color: #fff;
    }

    button.primary:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    button.danger {
      background: rgba(255, 90, 95, 0.9);
      color: #fff;
    }

    button.danger:hover {
      transform: translateY(-1px);
      filter: brightness(1.1);
    }

    .flex-between {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .items {
      display: grid;
      gap: 14px;
    }

    .item {
      padding: 16px 18px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .item-info {
      display: grid;
      gap: 4px;
    }

    .item-info strong {
      font-size: 1.05rem;
    }

    .category {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 24px 0;
      font-style: italic;
    }

    @media (max-width: 520px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      .form-row button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Style Me <span class="emoji">👕</span></h1>
      <p class="subtitle">A simple wardrobe tracker that helps you quickly organize and filter your looks.</p>
    </header>

    <section class="card">
      <h2>Add item</h2>
      <div class="form-row">
        <input id="name" placeholder="e.g. Black T-shirt" />
        <input id="category" placeholder="Category (Top, Bottom, Shoes)" />
        <button class="primary" onclick="addItem()">Add</button>
      </div>
    </section>

    <section class="card">
      <div class="flex-between">
        <h2>Filter</h2>
        <select id="filter" onchange="renderItems()">
          <option value="all">All</option>
          <option value="Top">Top</option>
          <option value="Bottom">Bottom</option>
          <option value="Shoes">Shoes</option>
        </select>
      </div>
    </section>

    <section class="card">
      <h2>Your Wardrobe</h2>
      <div id="items" class="items"></div>
    </section>
  </div>

  <!-- 🔥 FIREBASE SCRIPT -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      deleteDoc,
      doc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // Your web app's Firebase configuration
    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
    const firebaseConfig = {
      apiKey: "AIzaSyDnuEjzEf-YcQgVDWbes73trthiKouwPHE",
      authDomain: "style-me-3d6fc.firebaseapp.com",
      databaseURL: "https://style-me-3d6fc-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "style-me-3d6fc",
      storageBucket: "style-me-3d6fc.firebasestorage.app",
      messagingSenderId: "874243822353",
      appId: "1:874243822353:web:70b895cb671fc62a7b72b0",
      measurementId: "G-97MT6F05S6"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);

    // ADD ITEM
    async function addItem() {
      const name = document.getElementById("name").value;
      const category = document.getElementById("category").value;

      if (!name || !category) {
        alert("Please fill both fields");
        return;
      }

      await addDoc(collection(db, "wardrobe"), {
        name,
        category
      });

      document.getElementById("name").value = "";
      document.getElementById("category").value = "";

      renderItems();
    }

    // DELETE ITEM
    async function deleteItem(id) {
      await deleteDoc(doc(db, "wardrobe", id));
      renderItems();
    }

    // RENDER ITEMS
    async function renderItems() {
      const container = document.getElementById("items");
      const filter = document.getElementById("filter").value;

      container.innerHTML = "";

      const snapshot = await getDocs(collection(db, "wardrobe"));
      let hasItems = false;

      snapshot.forEach((docSnap) => {
        const item = docSnap.data();

        if (filter !== "all" && item.category !== filter) return;

        hasItems = true;

        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
          <div class="item-info">
            <strong>${item.name}</strong>
            <span class="category">${item.category}</span>
          </div>
          <button class="danger" onclick="deleteItem('${docSnap.id}')">Delete</button>
        `;

        container.appendChild(div);
      });

      if (!hasItems) {
        container.innerHTML = '<div class="empty">No items yet — add a piece to build your wardrobe.</div>';
      }
    }

    // MAKE FUNCTIONS GLOBAL (VERY IMPORTANT)
    window.addItem = addItem;
    window.deleteItem = deleteItem;
    window.renderItems = renderItems;

    // INITIAL LOAD
    renderItems();
  </script>

</body>
</html>
